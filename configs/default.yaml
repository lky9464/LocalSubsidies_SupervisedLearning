# 공통 설정 (커밋 가능). 절대경로는 local.yaml에만 둔다.

project_name: LocalSubsidies_SupervisedLearning
random_seed: 42

# data_root 하위 상대 경로
# - raw/interim/processed: 알고리즘 공통(1벌)
# - algorithms/{algo}/: 알고리즘별 학습·평가·점수 (5개 폴더)
paths:
  raw: raw
  interim: interim
  processed: processed
  algorithms: algorithms
  # 워크스페이스 상대 (repo 내부)
  reports: outputs/reports
  reports_comparison: outputs/reports/comparison

# raw 읽기 시 우선 시도 인코딩 (실패하면 encoding_candidates로 자동 폴백)
encoding: EUC-KR
encoding_candidates:
  - utf-8-sig
  - utf-8
  - EUC-KR
  - cp949
  - latin-1
# interim/labeled 등 중간 CSV 저장 인코딩
interim_encoding: utf-8-sig
csv_sep: ","

# 분할 (run_config로 오버라이드 가능)
# mode: time | random
# random: pool(train_start~train_end 또는 pool_*) 안에서 test_size 비율로 Test 고정, 나머지가 Train
#         → 12 튜닝은 Train 안에서만 Validation (nested_random)
split:
  mode: random
  # random 풀 기간 (라벨 있는 학습·평가 구간). time 모드에서는 train/test 기간으로 사용
  train_start: "202401"
  train_end: "202512"
  test_start: "202507"
  test_end: "202512"
  # random 모드
  test_size: 0.3
  random_state: 42
  # time 모드·참고: Train 끝부분 validation 기간
  valid_start: "202504"
  valid_end: "202506"

target_column: TAET_YN
positive_label: "Y"
negative_label: "N"

# 키 컬럼 (피처 제외, 품질점검·조인용)
key_columns:
  - CRTR_YM
  - PFM_BIZ_ID
  - INST_ID

# Feature에서 반드시 제외
exclude_features:
  # 타겟 및 타겟 수정에 사용한 플래그
  - TAET_YN
  - ISDP_RGSTR_YN
  - ISRC_DSCL_YN
  - PMBZ_CFMTN_YN
  # 식별자
  - PFM_BIZ_ID
  - INST_ID
  - LCL_AID_BIZ_ID
  # PII / 명칭
  - AID_BZR_RRNO
  - AID_BZR_BNO
  - PFM_BIZ_NM
  - INST_NM
  - LAF_NM
  - DEPT_NM
  - LCL_AID_BIZ_NM
  - NTS_BT_CD_NM
  - RPRSV_HSHD_DV_CD_NM
  - AID_BIZ_EXE_TY_CD_NM
  - FLD_CD_NM
  - SECT_CD_NM
  # 시스템 감사
  - FRST_RGSTR_USR_ID
  - FRST_RGSTR_DT
  - LAST_MDFCN_USR_ID
  - LAST_MDFCN_DT
  # 사후·결과성 (점수 시점 비가용 가능성 — 기본 제외)
  - RDP_TRGT_SUM_AMT
  - CUMU_NACK_CNT
  - CUMU_NACK_SUM_AMT
  - CLCN_NACK_AMT_EXI_YN
  - DTCT_MART_PTN_RLVT_YN

# 타겟 수정 규칙 (착수 후 사용자 규칙으로 교체)
# any_of_y: 나열된 컬럼 중 하나라도 Y이면 TAET_YN=Y
label_rule:
  mode: any_of_y
  source_columns:
    - ISDP_RGSTR_YN
    - ISRC_DSCL_YN
    - PMBZ_CFMTN_YN

# 추론(raw_inference): 레이아웃은 학습 raw와 동일하나 아래 컬럼은 사용하지 않음
inference:
  ignore_columns:
    - TAET_YN
    - ISDP_RGSTR_YN
    - ISRC_DSCL_YN
    - PMBZ_CFMTN_YN

# 위험도 점수
scoring:
  min_score: 0
  max_score: 1000

# 평가
evaluation:
  top_k_percents: [1, 5, 10]
  score_bins: 10
  min_cell_count: 5  # 리포트 셀 n<5 마스킹

# Feature 중요도 TOP-N
feature_importance:
  top_n: 10
  permutation_sample_size: 8000
  permutation_repeats: 2

# 주·보 상위% 구간 A~D (4×4). Test=타겟 포착 분포(10), 추론=점검 우선순위표
# primary_algo / aux_algo: 평가·순위(08) 후 설정. 데이터 변경 시 갱신 (고정 아님)
ops_queue:
  primary_algo: random_forest_v1
  aux_algo: catboost_v1
  a_top_pct: 1
  b_top_pct: 5
  c_top_pct: 10

# 08 모델 순위 · 주·보 역할 (Test 07 eval_summary 기준)
# 상세: docs/ranking_methodology.md
ranking:
  lift_tie_relative_pct: 3.0       # 리프트 상대차 < 3% → PR-AUC로 비교
  pr_auc_tie_absolute: 0.005       # PR-AUC 차 < 0.005 → 동순
  primary_pr_auc_abs_gap: 0.01     # primary PR-AUC 가드 (풀 최고 대비)
  primary_pr_auc_rel_gap_pct: 3.0

# 메모리 관련 (16GB RAM 환경)
memory:
  sklearn_encoding: ordinal  # onehot 사용 금지
  n_jobs: 2
  transform_dtype: float32

# 알고리즘 레지스트리: family → versions (algo_id = {family}_v{N})
# 새 Python 패키지 family는 v1부터. 하이퍼 변경 시 동일 family에 v2+ 추가.
algorithm_registry:
  catboost:
    label: CatBoost
    versions:
      v1:
        algo_id: catboost_v1
        script: scripts/05_train_catboost_v1.py
      v2:
        algo_id: catboost_v2
        label: CatBoost (v2)
        script: scripts/05_train_catboost_v2.py
  stacked_ensemble:
    label: Stacked Ensemble
    versions:
      v1:
        algo_id: stacked_ensemble_v1
        script: scripts/05_train_stacked_ensemble_v1.py
  easy_ensemble:
    label: EasyEnsemble
    versions:
      v1:
        algo_id: easy_ensemble_v1
        script: scripts/05_train_easy_ensemble_v1.py
  gradient_boosting:
    label: Gradient Boosting
    versions:
      v1:
        algo_id: gradient_boosting_v1
        script: scripts/05_train_gradient_boosting_v1.py
  random_forest:
    label: RandomForest
    versions:
      v1:
        algo_id: random_forest_v1
        script: scripts/05_train_random_forest_v1.py
      v2:
        algo_id: random_forest_v2
        label: RandomForest (v2)
        script: scripts/05_train_random_forest_v2.py

# 알고리즘별 하이퍼파라미터 (키 = algo_id). v1 = v0.3.0 기준선, v2 = Validation 튜닝 채택
model_params:
  catboost_v1:
    iterations: 400
    depth: 6
    learning_rate: 0.05
    auto_class_weights: Balanced
  catboost_v2:
    iterations: 500
    depth: 7
    learning_rate: 0.08
    auto_class_weights: Balanced
  random_forest_v1:
    n_estimators: 200
    max_depth: 20
    min_samples_leaf: 5
    class_weight: balanced
  random_forest_v2:
    n_estimators: 200
    max_depth: 24
    min_samples_leaf: 8
    class_weight: balanced
  gradient_boosting_v1:
    max_iter: 300
    max_depth: 6
    learning_rate: 0.05
    max_bins: 128
    class_weight: balanced
  stacked_ensemble_v1:
    cv: 3
    rf_n_estimators: 100
    rf_max_depth: 16
    rf_min_samples_leaf: 5
    hgb_max_depth: 5
    hgb_learning_rate: 0.05
    hgb_max_iter: 150
    hgb_max_bins: 128
    meta_max_iter: 500
  easy_ensemble_v1:
    n_estimators: 8

# Validation 소규모 격자 탐색 (scripts/12_tune_hyperparams.py)
# nested_random|random: 03의 train_mask 안에서만 fit/valid (Test 미사용, 권장)
# pool_random: 기간 풀 전체 분할 (레거시·Test와 겹칠 수 있음)
# time: split.valid_* 기간을 Train 안에서 Valid로 사용
tune:
  split_mode: nested_random
  valid_size: 0.2
  random_state: 42
  algorithms:
    - random_forest_v1
    - catboost_v1
  primary_metric: top1_lift
  min_precision_ratio: 0.85
  # --- 탐색 엔진 (현재: grid만 구현 · optuna는 § hyperparam_methodology.md §9 설계) ---
  # method: grid              # grid | optuna
  # n_trials: 25              # method=optuna
  # optuna_sampler: tpe       # tpe | random
  # catboost_pruning: true
  grids:
    random_forest_v1:
      n_estimators: [150, 200, 300]
      max_depth: [16, 20, 24]
      min_samples_leaf: [3, 5, 8]
    catboost_v1:
      iterations: [300, 400, 500]
      depth: [5, 6, 7]
      learning_rate: [0.03, 0.05, 0.08]

# 기본 학습 대상 algo_id 목록
algorithms:
  - catboost_v1
  - stacked_ensemble_v1
  - easy_ensemble_v1
  - gradient_boosting_v1
  - random_forest_v1

# CatBoost 범주형으로 다룰 후보 (실제 존재 컬럼만 사용)
categorical_candidates:
  - AID_BZR_CAP_CD
  - NTS_BT_CD
  - INST_TY_CD
  - RPRSV_HSHD_DV_CD
  - RPRSV_AGGP_DV_CD
  - RPRSV_DSCRD_YN
  - ODN_CAPT_DV_CD
  - OPCT_YN
  - AID_BIZ_EXE_TY_CD
  - PBAC_TY_DV_CD
  - CONT_BIZ_YN
  - AID_BIZ_DPI_DV_CD
  - PRIV_AID_BIZ_CGP_YN
  - PRIV_AID_BZR_YN
  - BIZ_ENFC_ZON_DV_CD
  - LBST_EXE_RT_DV_CD
  - VNCL_GOEM_VRSC_YN
  - NTN_DRCT_BIZ_YN
  - LSA_MNG_CMMT_DLBR_YN
  - EVENT_FSTV_YN
  - CB_YN
  - AID_BIZ_DV_CD
  - FLD_CD
  - SECT_CD
  - ACNT_DV_CD
  - LAF_CD
  - DEPT_CD
  - FYR
